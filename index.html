    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            // Check for updates every 60 minutes
            setInterval(function() { reg.update() }, 60 * 60 * 1000)

            // Listen for new service worker waiting
            reg.addEventListener('updatefound', function() {
              var newSW = reg.installing
              if (!newSW) return
              newSW.addEventListener('statechange', function() {
                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available — dispatch event for React to show prompt
                  window.dispatchEvent(new CustomEvent('sw-update-available', { detail: { registration: reg } }))
                }
              })
            })
          }).catch(function() {})
        })

        // Listen for SW_UPDATED message from activated service worker
        navigator.serviceWorker.addEventListener('message', function(event) {
          if (event.data && event.data.type === 'SW_UPDATED') {
            window.dispatchEvent(new CustomEvent('sw-updated', { detail: event.data }))
          }
        })
      }

      // Safety net: if JS crashes completely, show error instead of black screen
      window.addEventListener('error', function(e) {
        var boot = document.getElementById('boot-loader')
        if (boot) {
          boot.innerHTML = '<div style="text-align:center;padding:40px">'
            + '<div style="font-family:Bebas Neue,system-ui;font-size:28px;letter-spacing:4px;color:#ffffff;line-height:1;margin-bottom:16px">QIVORI</div>'
            + '<div style="color:#d95555;font-size:14px;font-weight:600;margin-bottom:12px;font-family:DM Sans,system-ui">Failed to load</div>'
            + '<div style="color:#6b7590;font-size:12px;margin-bottom:20px;font-family:DM Sans,system-ui">Try refreshing the page (Ctrl+Shift+R)</div>'
            + '<button onclick="location.reload(true)" style="padding:10px 24px;font-size:13px;font-weight:700;background:#f0a500;color:#000;border:none;border-radius:8px;cursor:pointer;font-family:DM Sans,system-ui">Reload</button>'
            + '</div>'
        }
      })
    </script>
