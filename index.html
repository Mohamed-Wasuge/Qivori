  <body>
    <div id="root">
      <!-- Inline loading indicator — prevents black screen while JS loads -->
      <div id="boot-loader" style="width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#0c0f15;position:fixed;top:0;left:0;z-index:99999">
        <div style="text-align:center">
          <div style="font-family:'Bebas Neue',system-ui,sans-serif;font-size:28px;letter-spacing:4px;color:#c8d0dc">QI<span style="color:#f0a500">VORI</span><span style="font-size:12px;color:#2cb896;letter-spacing:1px;font-family:'DM Sans',system-ui,sans-serif;font-weight:700;margin-left:6px">AI</span></div>
          <div style="width:40px;height:3px;background:#1a1f2a;border-radius:2px;margin:12px auto 0;overflow:hidden">
            <div style="width:50%;height:100%;background:#f0a500;border-radius:2px;animation:qbl 1s ease-in-out infinite alternate"></div>
          </div>
          <style>@keyframes qbl{from{transform:translateX(-100%)}to{transform:translateX(100%)}}</style>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Clear stale service workers and caches
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            for (var i = 0; i < regs.length; i++) regs[i].unregister()
          }).catch(function(){})
          if (typeof caches !== 'undefined') {
            caches.keys().then(function(keys) {
              for (var i = 0; i < keys.length; i++) caches.delete(keys[i])
            }).catch(function(){})
          }
        }
      } catch(e) {}

      // Safety net: if JS crashes completely, show error instead of black screen
      window.addEventListener('error', function(e) {
        var boot = document.getElementById('boot-loader')
        if (boot) {
          boot.innerHTML = '<div style="text-align:center;padding:40px">'
            + '<div style="font-family:Bebas Neue,system-ui;font-size:28px;letter-spacing:4px;color:#c8d0dc;margin-bottom:16px">QI<span style="color:#f0a500">VORI</span></div>'
            + '<div style="color:#d95555;font-size:14px;font-weight:600;margin-bottom:12px;font-family:DM Sans,system-ui">Failed to load</div>'
            + '<div style="color:#6b7590;font-size:12px;margin-bottom:20px;font-family:DM Sans,system-ui">Try refreshing the page (Ctrl+Shift+R)</div>'
            + '<button onclick="location.reload(true)" style="padding:10px 24px;font-size:13px;font-weight:700;background:#f0a500;color:#000;border:none;border-radius:8px;cursor:pointer;font-family:DM Sans,system-ui">Reload</button>'
            + '</div>'
        }
      })
    </script>
