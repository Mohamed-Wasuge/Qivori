<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qivori AI — Offline</title>
  <meta name="theme-color" content="#0a0a0e" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: #0a0a0e;
      color: #c8d0dc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 380px;
    }
    .logo {
      font-family: 'Bebas Neue', system-ui, sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      color: #c8d0dc;
      margin-bottom: 40px;
    }
    .logo span.accent { color: #f0a500; }
    .logo span.ai {
      font-size: 13px;
      color: #2cb896;
      letter-spacing: 1px;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 700;
      margin-left: 6px;
    }
    .icon-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(240, 165, 0, 0.08);
      border: 2px solid rgba(240, 165, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon-circle svg {
      width: 36px;
      height: 36px;
      stroke: #f0a500;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #e8ecf2;
      margin-bottom: 12px;
    }
    .message {
      font-size: 14px;
      color: #6b7590;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .sync-note {
      font-size: 12px;
      color: #4a5168;
      margin-top: 20px;
      padding: 12px 16px;
      background: rgba(240, 165, 0, 0.04);
      border: 1px solid rgba(240, 165, 0, 0.1);
      border-radius: 10px;
      line-height: 1.5;
    }
    .sync-note strong {
      color: #f0a500;
      font-weight: 600;
    }
    .retry-btn {
      margin-top: 28px;
      padding: 12px 32px;
      font-size: 14px;
      font-weight: 700;
      background: #f0a500;
      color: #0a0a0e;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'DM Sans', system-ui, sans-serif;
      transition: opacity 0.2s;
    }
    .retry-btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">QI<span class="accent">VORI</span><span class="ai">AI</span></div>

    <div class="icon-circle">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>

    <h1>You're Offline</h1>
    <p class="message">
      It looks like you've lost your internet connection.
      Check your Wi-Fi or cellular data and try again.
    </p>

    <div class="sync-note">
      <strong>Don't worry</strong> — any messages or actions you've queued
      will be sent automatically when you're back online.
    </div>

    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
